name: Scrape Water Quality Data

on:
  schedule:
    # 每小时触发一次 (UTC时间)
    # 脚本内部判断"距上次成功抓取是否≥2小时"再决定是否真抓
    # 这样能避免 GitHub Actions 高峰期延迟导致的"两轮合并为一轮"问题
    # 北京时间: 每小时第 15 分 (避开整点高峰)
    - cron: '15 * * * *'
  workflow_dispatch: # 允许手动触发
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/scrape.yml'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # 需要写权限来推送数据文件
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/scraper.py
        env:
          TZ: Asia/Shanghai # 设置时区为北京时间

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Data/
          if git diff --staged --quiet; then
            echo "No new data to commit"
          else
            COMMIT_MSG="Auto-scrape: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M') Beijing time"
            git commit -m "$COMMIT_MSG"
            git push
          fi
