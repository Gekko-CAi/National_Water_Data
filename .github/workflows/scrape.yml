name: Scrape Water Quality Data

on:
  schedule:
    # 每2小时运行一次 (UTC时间)，每小时的第25分钟
    # 北京时间: 00:25, 02:25, 04:25, 06:25, 08:25, 10:25, 12:25, 14:25, 16:25, 18:25, 20:25, 22:25
    - cron: '25 */2 * * *'
  workflow_dispatch: # 允许手动触发
  repository_dispatch: # 允许外部触发 (cron-job.org)
    types: [scrape]
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/scrape.yml'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # 需要写权限来推送数据文件
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/scraper.py
        env:
          TZ: Asia/Shanghai # 设置时区为北京时间

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Data/
          if git diff --staged --quiet; then
            echo "No new data to commit"
          else
            COMMIT_MSG="Auto-scrape: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M') Beijing time"
            git commit -m "$COMMIT_MSG"
            git push
          fi
